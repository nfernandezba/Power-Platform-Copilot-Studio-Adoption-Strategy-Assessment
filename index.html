let lang=localStorage.getItem('adoption-assessment-lang')||'es';
let phaseIndex=-1,maxReached=0,profile={},answers={},openAnswers={};
function c(){return CONTENT[lang]}
function escapeHtml(v=''){return String(v).replace(/[&<>"']/g,ch=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#039;'}[ch]))}
function activeModules(){const tech=profile.tech||[];return{PP:tech.some(x=>['powerapps','powerautomate','powerbi','powerpages'].includes(x)),CS:tech.includes('copilotstudio')}}
function phases(){const p=[{type:'profile',id:'profile',name:{es:'Perfil organizacional',en:'Organization profile'}},...DOMAINS.map(d=>({type:'domain',id:d.id,name:d.name}))];const m=activeModules();if(m.PP)p.push({type:'module',id:'PP',name:MODULES.PP.name});if(m.CS)p.push({type:'module',id:'CS',name:MODULES.CS.name});p.push({type:'open',id:'open',name:{es:'Contexto y prioridades',en:'Context and priorities'}},{type:'results',id:'results',name:{es:'Resultados',en:'Results'}});return p}
function setLanguage(v){lang=v;localStorage.setItem('adoption-assessment-lang',v);document.documentElement.lang=v==='es'?'es-AR':'en-US';document.querySelectorAll('.lang-btn').forEach(b=>b.classList.toggle('active',b.dataset.lang===v));document.getElementById('banner-desc').textContent=c().bannerDesc;document.getElementById('footer-privacy').textContent=c().privacy;if(phaseIndex<0)renderIntro();else renderPhase()}
function init(){setLanguage(lang)}
function renderIntro(){phaseIndex=-1;document.body.classList.add('intro-mode');document.getElementById('bpf-wrap').hidden=true;document.getElementById('screen-container').innerHTML=`<section id="intro-screen"><div class="intro-logo">${document.querySelector('.brand-logo').outerHTML}</div><h1 class="intro-title">${TOOL_TITLE}</h1><p class="intro-body">${c().introBody}</p><div class="intro-grid">${c().introItems.map(x=>`<div class="intro-item">${x}</div>`).join('')}</div><div class="disclaimer">${c().disclaimer}</div><div class="privacy-note">${c().privacy}</div><button class="btn btn-primary" onclick="startAssessment()">${c().start}</button></section>`}
function startAssessment(){phaseIndex=0;maxReached=Math.max(maxReached,0);document.body.classList.remove('intro-mode');document.getElementById('bpf-wrap').hidden=false;renderPhase()}
function renderBpf(){const ps=phases(),pct=ps.length<=1?100:Math.round((Math.max(phaseIndex,0)/(ps.length-1))*100),desktop=ps.map((p,i)=>`<button type="button" class="bpf-phase ${i===phaseIndex?'active':''} ${i<phaseIndex?'done':''} ${i<=maxReached?'clickable':''}" ${i<=maxReached?`onclick="goToPhase(${i})"`:'disabled'}><span class="bpf-circle">${i<phaseIndex?'✓':i+1}</span><span class="bpf-label">${p.name[lang]}</span></button>`).join('');const current=ps[Math.max(0,phaseIndex)];document.getElementById('bpf').innerHTML=`<div class="bpf-desktop">${desktop}</div><div class="bpf-mobile"><details class="bpf-mobile-details"><summary class="bpf-mobile-summary"><span class="bpf-mobile-copy"><span class="bpf-mobile-step">${c().stepLabel(phaseIndex+1,ps.length)}</span><span class="bpf-mobile-title">${current.name[lang]}</span></span><span class="bpf-mobile-toggle">${c().showSteps}</span><div class="bpf-progress-track"><div class="bpf-progress-fill" style="width:${pct}%"></div></div></summary><div class="bpf-mobile-list">${desktop}</div></details></div>`}
function goToPhase(i){if(i<=maxReached){phaseIndex=i;renderPhase()}}
function renderPhase(){renderBpf();const p=phases()[phaseIndex];if(!p){renderIntro();return}if(p.type==='profile')renderProfile();else if(p.type==='domain')renderDomain(DOMAINS.find(d=>d.id===p.id));else if(p.type==='module')renderDomain(MODULES[p.id],true);else if(p.type==='open')renderOpen();else renderResults();window.scrollTo({top:0,behavior:'smooth'})}
function renderProfile(){const cards=PROFILE.map(f=>`<section class="profile-card" data-field="${f.key}"><div class="profile-label">${f.id}</div><div class="profile-question">${f.q[lang]}</div>${f.type==='select'?renderSelect(f):renderMulti(f)}<div class="field-error" hidden>${c().required}</div></section>`).join('');document.getElementById('screen-container').innerHTML=`<div class="section-intro"><h1 class="section-title" tabindex="-1">${c().profileTitle}</h1><p class="section-desc">${c().profileDesc}</p></div>${cards}${navHtml()}`;bindProfile()}
function renderSelect(f){return`<select class="select-input" data-profile="${f.key}"><option value="">—</option>${f.options.map(o=>`<option value="${o[0]}" ${profile[f.key]===o[0]?'selected':''}>${o[lang==='es'?1:2]}</option>`).join('')}</select>`}
function renderMulti(f){const vals=profile[f.key]||[];return`<div class="checkbox-group">${f.options.map(o=>`<label class="checkbox-option ${vals.includes(o[0])?'selected':''}"><input type="checkbox" data-profile="${f.key}" value="${o[0]}" ${vals.includes(o[0])?'checked':''}/><span class="check-box">${vals.includes(o[0])?'✓':''}</span><span>${o[lang==='es'?1:2]}</span></label>`).join('')}</div>`}
function bindProfile(){document.querySelectorAll('[data-profile]').forEach(el=>el.addEventListener('change',()=>{const key=el.dataset.profile;if(el.type==='checkbox'){profile[key]=[...document.querySelectorAll(`input[data-profile="${key}"]:checked`)].map(x=>x.value);document.querySelectorAll(`input[data-profile="${key}"]`).forEach(x=>{x.closest('label').classList.toggle('selected',x.checked);x.closest('label').querySelector('.check-box').textContent=x.checked?'✓':''})}else profile[key]=el.value;const card=el.closest('.profile-card');card.classList.remove('has-error');card.querySelector('.field-error').hidden=true;if(key==='tech')renderBpf()}))}
function scaleGuide(){return`<details class="scale-guide"><summary>${c().scaleGuide}</summary><p class="scale-guide-intro">${c().scaleIntro}</p><div class="scale-definition-list">${c().scaleDefs.map(x=>`<div class="scale-definition"><strong>${x[0]}</strong><span>${x[1]}</span></div>`).join('')}</div></details>`}
function renderDomain(d,isModule=false){const qs=d.questions.map(q=>statementCard(q,isModule)).join('');document.getElementById('screen-container').innerHTML=`<div class="section-intro"><h1 class="section-title" tabindex="-1">${d.name[lang]}</h1><p class="section-desc">${d.desc[lang]}</p>${!isModule?`<span class="domain-weight">${c().weight}: ${d.weight}%</span>`:`<span class="domain-weight">${c().conditional}</span>`}</div>${scaleGuide()}${qs}${navHtml()}`}
function statementCard(q,isModule){const v=answers[q.id];return`<section class="statement-card ${v===undefined?'unanswered':'answered'}" data-question="${q.id}"><div class="stmt-meta"><span class="stmt-id">${q.id}</span>${q.critical?`<span class="critical-badge">${c().critical}</span>`:''}${isModule?`<span class="conditional-badge">${c().conditional}</span>`:''}</div><div class="stmt-text">${q.text[lang]}</div><div class="scale-row">${[0,1,2,3,4,'na'].map(x=>`<button type="button" class="scale-chip ${String(v)===String(x)?`selected-${x}`:''}" onclick="setAnswer('${q.id}','${x}')">${x==='na'?'N/A':x}</button>`).join('')}</div><div class="scale-selected ${v===undefined?'empty':''}">${scaleSelection(v)}</div><div class="field-error" hidden>${c().answerAll}</div></section>`}
function scaleSelection(v){if(v===undefined)return c().scaleIntro;if(v==='na')return`<strong>${c().scaleDefs[5][0]}</strong><span>${c().scaleDefs[5][1]}</span>`;return`<strong>${c().scaleDefs[Number(v)][0]}</strong><span>${c().scaleDefs[Number(v)][1]}</span>`}
function setAnswer(id,v){answers[id]=v==='na'?'na':Number(v);const card=document.querySelector(`[data-question="${id}"]`);if(card){card.outerHTML=statementCard(findQuestion(id),id.startsWith('PP')||id.startsWith('CS'))}}
function findQuestion(id){for(const d of DOMAINS)for(const q of d.questions)if(q.id===id)return q;for(const m of Object.values(MODULES))for(const q of m.questions)if(q.id===id)return q;return null}
function renderOpen(){document.getElementById('screen-container').innerHTML=`<div class="section-intro"><h1 class="section-title" tabindex="-1">${c().openTitle}</h1><p class="section-desc">${c().openDesc}</p></div>${OPEN.map(o=>`<section class="open-card"><div class="profile-label">${o.id}</div><div class="profile-question">${o.q[lang]}</div><textarea class="textarea-input" data-open="${o.id}">${escapeHtml(openAnswers[o.id]||'')}</textarea></section>`).join('')}${navHtml()}`;document.querySelectorAll('[data-open]').forEach(x=>x.addEventListener('input',()=>openAnswers[x.dataset.open]=x.value))}
function navHtml(){const ps=phases();return`<div class="nav-row"><button class="btn btn-ghost" onclick="prevPhase()" ${phaseIndex===0?'disabled':''}>${c().back}</button><div class="nav-progress">${c().stepLabel(phaseIndex+1,ps.length)}</div><button class="btn btn-primary" onclick="nextPhase()">${phaseIndex===ps.length-2?c().results:c().next}</button></div>`}
function prevPhase(){if(phaseIndex>0){phaseIndex--;renderPhase()}}
function nextPhase(){if(!validatePhase())return;phaseIndex=Math.min(phaseIndex+1,phases().length-1);maxReached=Math.max(maxReached,phaseIndex);renderPhase()}
function validatePhase(){const p=phases()[phaseIndex];if(p.type==='profile'){let ok=true;PROFILE.forEach(f=>{const val=profile[f.key],bad=f.type==='multi'?!(val&&val.length):!val;const card=document.querySelector(`[data-field="${f.key}"]`);card.classList.toggle('has-error',bad);card.querySelector('.field-error').hidden=!bad;if(bad)ok=false});if(!ok)document.querySelector('.has-error')?.scrollIntoView({behavior:'smooth',block:'center'});return ok}if(p.type==='domain'||p.type==='module'){const qs=p.type==='domain'?DOMAINS.find(d=>d.id===p.id).questions:MODULES[p.id].questions;const missing=qs.filter(q=>answers[q.id]===undefined);if(missing.length){missing.forEach(q=>{const card=document.querySelector(`[data-question="${q.id}"]`);card?.classList.add('has-error');if(card)card.querySelector('.field-error').hidden=false});document.querySelector('.has-error')?.scrollIntoView({behavior:'smooth',block:'center'});return false}}return true}
function applicableQuestions(){const qs=DOMAINS.flatMap(d=>d.questions);const m=activeModules();if(m.PP)qs.push(...MODULES.PP.questions);if(m.CS)qs.push(...MODULES.CS.questions);return qs}
function domainScore(d){const vals=d.questions.map(q=>answers[q.id]).filter(v=>typeof v==='number');return vals.length?Math.round(vals.reduce((a,b)=>a+b,0)/(vals.length*4)*100):0}
function moduleScore(m){const vals=m.questions.map(q=>answers[q.id]).filter(v=>typeof v==='number');return vals.length?Math.round(vals.reduce((a,b)=>a+b,0)/(vals.length*4)*100):0}
function overallScore(){let total=0,w=0;DOMAINS.forEach(d=>{const vals=d.questions.map(q=>answers[q.id]).filter(v=>typeof v==='number');if(vals.length){total+=domainScore(d)*d.weight;w+=d.weight}});return w?Math.round(total/w):0}
function levelKey(s){return s<40?'initial':s<60?'emerging':s<75?'defined':s<90?'managed':'optimized'}
function riskStatus(){const critical=applicableQuestions().filter(q=>q.critical).map(q=>({q,v:answers[q.id]})).filter(x=>typeof x.v==='number');const zeros=critical.filter(x=>x.v===0),ones=critical.filter(x=>x.v===1),twos=critical.filter(x=>x.v===2);if(zeros.length||ones.length>=2)return{key:'red',items:[...zeros,...ones].slice(0,6)};if(ones.length===1||twos.length>=2)return{key:'amber',items:[...ones,...twos].slice(0,6)};return{key:'green',items:[]}}
function completeness(){const qs=applicableQuestions();return qs.length?Math.round(qs.filter(q=>answers[q.id]!==undefined).length/qs.length*100):0}
function coverageClass(v){return v==='na'?'na':String(v??0)}
function domainBarClass(p){return p<40?'bar-critical':p<75?'bar-attention':'bar-healthy'}
function statusClass(k){return k==='red'?'status-red':k==='amber'?'status-amber':'status-green'}
function priorityActions(){const scores=DOMAINS.map(d=>({id:d.id,name:d.name[lang],score:domainScore(d)})).sort((a,b)=>a.score-b.score);const out=[];scores.slice(0,3).forEach((x,i)=>RECOMMENDATIONS[x.id][lang].forEach((t,j)=>{if(out.length<5)out.push({id:x.id,domain:x.name,text:t,horizon:c().horizons[Math.min(i+j,2)]})}));const m=activeModules();if(m.PP&&moduleScore(MODULES.PP)<60&&out.length<5)out.push({id:'PP',domain:MODULES.PP.name[lang],text:RECOMMENDATIONS.PP[lang][0],horizon:c().horizons[2]});if(m.CS&&moduleScore(MODULES.CS)<60&&out.length<5)out.push({id:'CS',domain:MODULES.CS.name[lang],text:RECOMMENDATIONS.CS[lang][0],horizon:c().horizons[2]});return out.slice(0,5)}
function strongest(){return DOMAINS.map(d=>({id:d.id,name:d.name[lang],score:domainScore(d)})).sort((a,b)=>b.score-a.score).slice(0,3)}
function displayOption(field,key){const f=PROFILE.find(x=>x.key===field);const o=f?.options.find(x=>x[0]===key);return o?o[lang==='es'?1:2]:c().unknown}
function profileValue(key){const v=profile[key];if(Array.isArray(v))return v.map(x=>displayOption(key,x)).join(', ')||c().unknown;return displayOption(key,v)}
function resultDetails(title,body){return`<details class="result-details"><summary>${title}</summary><div class="result-details-body">${body}</div></details>`}
function renderToolsCTA(){return`<section class="resources-cta"><div class="cta-header"><h3 class="cta-title">${c().toolsTitle}</h3><p class="cta-copy">${c().toolsBody}</p></div><div class="tools-grid">${TOOLS.map(t=>`<a class="tool-card" href="${t.url}" target="_blank" rel="noopener noreferrer"><div class="tool-preview"></div><div class="tool-body"><div class="tool-card-title">${t.title}</div><div class="tool-card-copy">${t.copy[lang]}</div><div class="tool-link">${c().openTool} ↗</div></div></a>`).join('')}</div></section>`}
function renderBooksCTA(){return`<section class="books-cta"><div class="cta-header"><h3 class="cta-title">${c().booksTitle}</h3><p class="cta-copy">${c().booksBody}</p></div><div class="books-grid">${BOOKS[lang].map(b=>`<article class="book-card"><div class="book-cover-wrap"><img class="book-cover" src="${b.cover}" alt="${escapeHtml(b.title)}" loading="lazy" onerror="this.style.display='none';this.nextElementSibling.style.display='flex'"/><div class="book-cover-fallback">${escapeHtml(b.title)}</div></div><div><div class="book-title">${escapeHtml(b.title)}</div><div class="book-author">Nicolás Andrés Fernández</div><a class="book-link" href="${b.url}" target="_blank" rel="noopener noreferrer">${c().bookButton} ↗</a></div></article>`).join('')}</div></section>`}
function renderResults(){const score=overallScore(),level=c().levels[levelKey(score)],risk=riskStatus(),comp=completeness(),actions=priorityActions(),strong=strongest(),m=activeModules();const coverage=`<div class="coverage-grid">${applicableQuestions().map(q=>{const v=answers[q.id],k=coverageClass(v);return`<div class="coverage-item"><div class="coverage-top"><div><div class="coverage-id">${q.id}</div><div class="coverage-title">${q.title[lang]}</div></div><span class="coverage-badge cov-${k}">${c().coverageLabels[k]}</span></div></div>`}).join('')}</div>`;const profileHtml=`<div class="coverage-grid">${PROFILE.map(f=>`<div class="coverage-item"><div class="coverage-id">${c().profileLabels[f.key]}</div><div class="coverage-title">${escapeHtml(profileValue(f.key))}</div></div>`).join('')}</div>`;const openHtml=`<div>${OPEN.map(o=>`<div class="item-card"><span class="item-id">${o.id}</span><div class="item-text"><strong>${o.q[lang]}</strong><br/><span style="color:var(--muted)">${escapeHtml(openAnswers[o.id]||c().unknown)}</span></div></div>`).join('')}</div>`;document.getElementById('screen-container').innerHTML=`<div class="section-intro"><h1 class="section-title" tabindex="-1">${c().resultsTitle}</h1></div><div class="results-header"><div class="score-big">${score}</div><div class="rating-label">${level[0]}</div><div style="color:var(--muted);font-size:.8rem">${c().overall}: ${score}/100</div></div><div class="indicator-grid"><div class="indicator-card"><div class="indicator-label">${c().risk}</div><span class="status-pill ${statusClass(risk.key)}">${c().riskLabels[risk.key]}</span></div><div class="indicator-card"><div class="indicator-label">${c().completeness}</div><span class="status-pill ${comp===100?'status-green':'status-amber'}">${comp}%</span></div><div class="indicator-card"><div class="indicator-label">${c().overall}</div><span class="status-pill status-blue">${level[0]}</span></div></div><div class="results-actions"><button class="btn btn-pdf" id="pdf-btn" onclick="downloadPdfReport()">▣ <span>${c().downloadPdf}</span></button></div><section class="result-msg-card"><h3>${level[1]}</h3><p>${level[2]}</p></section><h2 class="results-section-title"><span class="dot"></span>${c().domainScores}</h2>${DOMAINS.map(d=>{const s=domainScore(d);return`<div class="domain-bar-row"><div class="domain-bar-label"><span class="domain-bar-name">${d.name[lang]}</span><span class="domain-bar-pct">${s}% · ${d.weight}/100</span></div><div class="domain-bar-track"><div class="domain-bar-fill ${domainBarClass(s)}" style="width:${s}%"></div></div></div>`}).join('')}${m.PP?moduleBar(MODULES.PP):''}${m.CS?moduleBar(MODULES.CS):''}<h2 class="results-section-title"><span class="dot" style="background:var(--magenta)"></span>${c().priorityActions}</h2>${actions.map((a,i)=>`<div class="action-card"><div class="action-num">${i+1}</div><div class="action-body"><div class="action-meta">${a.id} · ${a.domain} · ${a.horizon}</div><div class="action-text">${a.text}</div></div></div>`).join('')}<h2 class="results-section-title"><span class="dot" style="background:var(--teal)"></span>${c().strengths}</h2>${strong.map(x=>`<div class="item-card"><span class="item-id">${x.id}</span><div class="item-text"><strong>${x.name}</strong><br/><span style="color:var(--muted)">${x.score}%</span></div></div>`).join('')}${resultDetails(c().coverageMap,coverage)}${resultDetails(c().profileDetail,profileHtml)}${resultDetails(c().openDetail,openHtml)}<div class="results-actions"><button class="btn btn-linkedin" onclick="shareLinkedIn()">in&nbsp; ${c().linkedin}</button><button class="btn btn-ghost" onclick="retake()">${c().retake}</button></div>${renderToolsCTA()}${renderBooksCTA()}`;renderBpf()}

function pdfSafe(v){return String(v??'').replace(/[–—]/g,'-').replace(/≥/g,'>=').replace(/≤/g,'<=').replace(/[“”]/g,'"').replace(/[‘’]/g,"'").replace(/→/g,'->').replace(/·/g,'|').normalize('NFD').replace(/[\u0300-\u036f]/g,'')}
function hexRgb(h){const x=h.replace('#','');return[parseInt(x.slice(0,2),16),parseInt(x.slice(2,4),16),parseInt(x.slice(4,6),16)]}
function loadImage(src,timeout=9000){return new Promise((resolve,reject)=>{const img=new Image();img.crossOrigin='anonymous';const timer=setTimeout(()=>reject(new Error('timeout')),timeout);img.onload=()=>{clearTimeout(timer);try{const canvas=document.createElement('canvas');canvas.width=img.naturalWidth||img.width;canvas.height=img.naturalHeight||img.height;canvas.getContext('2d').drawImage(img,0,0);resolve(canvas.toDataURL('image/jpeg',.9))}catch(e){reject(e)}};img.onerror=()=>{clearTimeout(timer);reject(new Error('load'))};img.src=src})}
function logoData(){return new Promise((resolve,reject)=>{const svg=document.querySelector('.brand-logo').cloneNode(true);svg.setAttribute('width','375');svg.setAttribute('height','375');const img=new Image();img.onload=()=>{const canvas=document.createElement('canvas');canvas.width=750;canvas.height=750;canvas.getContext('2d').drawImage(img,0,0,750,750);resolve(canvas.toDataURL('image/png'))};img.onerror=reject;img.src='data:image/svg+xml;charset=utf-8,'+encodeURIComponent(new XMLSerializer().serializeToString(svg))})}

async function downloadPdfReport(){const btn=document.getElementById('pdf-btn');if(!window.jspdf?.jsPDF){showToast(c().pdfError);return}btn.disabled=true;btn.querySelector('span').textContent=c().generatingPdf;try{const{jsPDF}=window.jspdf,doc=new jsPDF({unit:'mm',format:'a4',compress:true}),W=210,H=297,M=16;const col={indigo:hexRgb('#5552B4'),blue:hexRgb('#3895FF'),teal:hexRgb('#27B8C6'),gold:hexRgb('#FFC000'),magenta:hexRgb('#BD47BD'),red:hexRgb('#EE0055'),ink:hexRgb('#0B0B0F'),surface:hexRgb('#16161D'),muted:hexRgb('#666978'),line:hexRgb('#D9DAE1'),white:[255,255,255]};const score=overallScore(),level=c().levels[levelKey(score)],risk=riskStatus(),comp=completeness(),actions=priorityActions(),m=activeModules(),covers=await Promise.all(BOOKS[lang].map(b=>loadImage(b.cover).catch(()=>null))),logo=await logoData().catch(()=>null);let page=1,y=20;const txt=x=>doc.setTextColor(...x),fill=x=>doc.setFillColor(...x),draw=x=>doc.setDrawColor(...x),wrap=(t,w)=>doc.splitTextToSize(pdfSafe(t),w);function footer(dark=false){draw(dark?[55,55,65]:col.line);doc.line(M,H-14,W-M,H-14);doc.setFont('helvetica','normal');doc.setFontSize(7);txt(dark?[185,188,198]:col.muted);doc.text(pdfSafe(c().reportFooter),M,H-8);doc.textWithLink('LinkedIn: linkedin.com/in/nfernandezba',W-M-46,H-8,{url:LINKEDIN_URL});doc.text(String(page),W-M,H-8,{align:'right'})}function addPage(){footer();doc.addPage();page++;y=20}function ensure(h){if(y+h>H-20)addPage()}function section(title,accent=col.indigo){ensure(14);fill(accent);doc.roundedRect(M,y-4,3,6,1,1,'F');doc.setFont('helvetica','bold');doc.setFontSize(12);txt(col.ink);doc.text(pdfSafe(title),M+6,y);y+=9}function para(text,size=8.7,color=col.muted,width=W-2*M){doc.setFont('helvetica','normal');doc.setFontSize(size);txt(color);const lines=wrap(text,width);doc.text(lines,M,y);y+=lines.length*4.2+3}

doc.addPage();page++;y=22;section(lang==='es'?'Resumen ejecutivo':'Executive summary');doc.setFont('helvetica','bold');doc.setFontSize(11);txt(col.ink);doc.text(pdfSafe(level[1]),M,y);y+=7;para(level[2]);section(c().domainScores,col.blue);DOMAINS.forEach(d=>{ensure(14);const s=domainScore(d);doc.setFont('helvetica','bold');doc.setFontSize(8.2);txt(col.ink);doc.text(pdfSafe(d.name[lang]),M,y);doc.setFont('helvetica','normal');txt(col.muted);doc.text(`${s}%`,W-M,y,{align:'right'});fill([235,236,241]);doc.roundedRect(M,y+2,W-2*M,4,2,2,'F');fill(s<40?col.red:s<75?col.gold:col.teal);doc.roundedRect(M,y+2,(W-2*M)*s/100,4,2,2,'F');y+=13});if(m.PP||m.CS){section(lang==='es'?'Módulos tecnológicos':'Technology modules',col.teal);if(m.PP)para(`${MODULES.PP.name[lang]}: ${moduleScore(MODULES.PP)}%`,8.5,col.ink);if(m.CS)para(`${MODULES.CS.name[lang]}: ${moduleScore(MODULES.CS)}%`,8.5,col.ink)}section(c().profileDetail,col.teal);PROFILE.forEach(f=>{ensure(10);doc.setFont('helvetica','bold');doc.setFontSize(7.6);txt(col.muted);doc.text(pdfSafe(c().profileLabels[f.key]),M,y);doc.setFont('helvetica','normal');txt(col.ink);doc.text(wrap(profileValue(f.key),112),M+58,y);y+=9});footer();
