  Q("D04","Controles proporcionales","Proportionate controls","Los controles de gobierno se aplican de manera proporcional al riesgo y permiten avanzar sin generar fricción innecesaria.","Governance controls are proportionate to risk and enable progress without unnecessary friction.",true)

function c(){return CONTENT[lang]}
function escapeHtml(v=''){return String(v).replace(/[&<>"']/g,ch=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#039;'}[ch]))}
function activeModules(){const tech=profile.tech||[];return{PP:tech.some(x=>['powerapps','powerautomate','powerbi','powerpages'].includes(x)),CS:tech.includes('copilotstudio')}}
function phases(){const p=[{type:'profile',id:'profile',name:{es:'Perfil organizacional',en:'Organization profile'}},...DOMAINS.map(d=>({type:'domain',id:d.id,name:d.name}))];const m=activeModules();if(m.PP)p.push({type:'module',id:'PP',name:MODULES.PP.name});if(m.CS)p.push({type:'module',id:'CS',name:MODULES.CS.name});p.push({type:'open',id:'open',name:{es:'Contexto y prioridades',en:'Context and priorities'}},{type:'results',id:'results',name:{es:'Resultados',en:'Results'}});return p}
function setLanguage(v){
  lang=v==='en'?'en':'es';
  safeStorageSet('adoption-assessment-lang',lang);
  document.documentElement.lang=lang==='es'?'es-AR':'en-US';
  document.title=TOOL_TITLE;
  document.querySelector('meta[name="description"]')?.setAttribute('content',c().metaDescription);
  document.querySelectorAll('.lang-btn').forEach(b=>{const active=b.dataset.lang===lang;b.classList.toggle('active',active);b.setAttribute('aria-pressed',String(active))});
  document.getElementById('banner-desc').textContent=c().bannerDesc;
  document.getElementById('app-version').textContent=APP_VERSION;
  document.getElementById('global-controls').setAttribute('aria-label',c().globalControls);
  document.getElementById('lang-switch').setAttribute('aria-label',c().languageLabel);
  document.getElementById('bpf-wrap').setAttribute('aria-label',c().assessmentProgress);
  const author=document.getElementById('header-author');author.setAttribute('aria-label',c().authorLabel);author.setAttribute('title',c().authorLabel);
  document.getElementById('footer-product').textContent=`${TOOL_TITLE} · CoE Toolkit · ${APP_VERSION} · ${APP_YEAR}`;
  document.getElementById('footer-author-label').textContent='LinkedIn · Nico Fernandez';
  document.getElementById('footer-author').setAttribute('aria-label',c().authorLabel);
  document.getElementById('footer-privacy').textContent=c().privacy;
  if(sampleModeActive)openAnswers=Object.fromEntries(Object.entries(SAMPLE_OPEN).map(([k,value])=>[k,value[lang]]));
  const testBadge=document.getElementById('test-badge');testBadge.textContent=c().testBadge;testBadge.hidden=!TEST_MODE;
  if(phaseIndex<0)renderIntro();else renderPhase();
}
function init(){
  document.body.classList.toggle('test-mode',TEST_MODE);
  setLanguage(lang);

}
function renderTestPanel(){if(!TEST_MODE)return'';return`<aside class="test-panel" aria-labelledby="test-mode-title"><span class="test-panel__eyebrow">${c().testBadge}</span><h2 id="test-mode-title">${c().testTitle}</h2><p>${c().testBody}</p><div class="test-panel__actions"><button class="btn btn-primary" type="button" onclick="loadSampleAssessment(true)">${c().testOpenSample}</button><button class="btn btn-ghost" type="button" onclick="downloadSampleReport()">${c().testDownloadSample}</button><button class="btn btn-ghost" type="button" onclick="runSelfTests(true)">${c().testRun}</button></div><div class="test-results" id="test-results" hidden></div></aside>`}
function stateSnapshot(){return{phaseIndex,maxReached,profile:JSON.parse(JSON.stringify(profile)),answers:JSON.parse(JSON.stringify(answers)),openAnswers:JSON.parse(JSON.stringify(openAnswers)),sampleModeActive}}
function restoreSnapshot(x){phaseIndex=x.phaseIndex;maxReached=x.maxReached;profile=x.profile;answers=x.answers;openAnswers=x.openAnswers;sampleModeActive=x.sampleModeActive}
function applySampleState(){profile=JSON.parse(JSON.stringify(SAMPLE_PROFILE));answers=JSON.parse(JSON.stringify(SAMPLE_ANSWERS));openAnswers=Object.fromEntries(Object.entries(SAMPLE_OPEN).map(([k,v])=>[k,v[lang]]));sampleModeActive=true;maxReached=phases().length-1}
function loadSampleAssessment(showResults=true){applySampleState();if(showResults){phaseIndex=phases().length-1;document.body.classList.remove('intro-mode');document.getElementById('bpf-wrap').hidden=false;renderPhase();showToast(c().sampleLoaded)}}
function downloadSampleReport(){try{const binary=atob(SAMPLE_PDF_BASE64[lang]),bytes=new Uint8Array(binary.length);for(let i=0;i<binary.length;i++)bytes[i]=binary.charCodeAt(i);const blob=new Blob([bytes],{type:'application/pdf'}),url=URL.createObjectURL(blob),a=document.createElement('a');a.href=url;a.download=c().sampleFileName;document.body.appendChild(a);a.click();a.remove();setTimeout(()=>URL.revokeObjectURL(url),1000);showToast(c().sampleDownloaded)}catch(e){console.error(e);showToast(c().pdfError)}}

function scaleGuide(){return`<details class="scale-guide"><summary>${c().scaleGuide}</summary><p class="scale-guide-intro">${c().scaleIntro}</p><div class="scale-definition-list">${c().scaleDefs.map(x=>`<div class="scale-definition"><strong>${x[0]}</strong><span>${x[1]}</span></div>`).join('')}</div></details>`}
function renderDomain(d,isModule=false){const qs=d.questions.map(q=>statementCard(q,isModule)).join('');document.getElementById('screen-container').innerHTML=`<div class="section-intro"><h1 class="section-title" tabindex="-1">${d.name[lang]}</h1><p class="section-desc">${d.desc[lang]}</p>${!isModule?`<span class="domain-weight">${c().weight}: ${d.weight}%</span>`:`<span class="domain-weight">${c().conditional}</span>`}</div>${scaleGuide()}${qs}${navHtml()}`}
function statementCard(q,isModule){const v=answers[q.id];return`<section class="statement-card ${v===undefined?'unanswered':'answered'}" data-question="${q.id}"><div class="stmt-meta"><span class="stmt-id">${q.id}</span>${q.critical?`<span class="critical-badge">${c().critical}</span>`:''}${isModule?`<span class="conditional-badge">${c().conditional}</span>`:''}</div><div class="stmt-text">${q.text[lang]}</div><div class="scale-row">${[0,1,2,3,4,'na'].map(x=>`<button type="button" class="scale-chip ${String(v)===String(x)?`selected-${x}`:''}" onclick="setAnswer('${q.id}','${x}')">${x==='na'?'N/A':x}</button>`).join('')}</div><div class="scale-selected ${v===undefined?'empty':''}">${scaleSelection(v)}</div><div class="field-error" hidden>${c().answerAll}</div></section>`}

function findQuestion(id){for(const d of DOMAINS)for(const q of d.questions)if(q.id===id)return q;for(const m of Object.values(MODULES))for(const q of m.questions)if(q.id===id)return q;return null}
function renderOpen(){document.getElementById('screen-container').innerHTML=`<div class="section-intro"><h1 class="section-title" tabindex="-1">${c().openTitle}</h1><p class="section-desc">${c().openDesc}</p></div>${OPEN.map(o=>`<section class="open-card"><div class="profile-label">${o.id}</div><div class="profile-question">${o.q[lang]}</div><textarea class="textarea-input" data-open="${o.id}">${escapeHtml(openAnswers[o.id]||'')}</textarea></section>`).join('')}${navHtml()}`;document.querySelectorAll('[data-open]').forEach(x=>x.addEventListener('input',()=>{sampleModeActive=false;openAnswers[x.dataset.open]=x.value}))}
function navHtml(){const ps=phases();return`<div class="nav-row"><button class="btn btn-ghost" onclick="prevPhase()" ${phaseIndex===0?'disabled':''}>${c().back}</button><div class="nav-progress">${c().stepLabel(phaseIndex+1,ps.length)}</div><button class="btn btn-primary" onclick="nextPhase()">${phaseIndex===ps.length-2?c().results:c().next}</button></div>`}
function prevPhase(){if(phaseIndex>0){phaseIndex--;renderPhase()}}
function nextPhase(){if(!validatePhase())return;phaseIndex=Math.min(phaseIndex+1,phases().length-1);maxReached=Math.max(maxReached,phaseIndex);renderPhase()}
function validatePhase(){const p=phases()[phaseIndex];if(p.type==='profile'){let ok=true;PROFILE.forEach(f=>{const val=profile[f.key],bad=f.type==='multi'?!(val&&val.length):!val;const card=document.querySelector(`[data-field="${f.key}"]`);card.classList.toggle('has-error',bad);card.querySelector('.field-error').hidden=!bad;if(bad)ok=false});if(!ok)document.querySelector('.has-error')?.scrollIntoView({behavior:'smooth',block:'center'});return ok}if(p.type==='domain'||p.type==='module'){const qs=p.type==='domain'?DOMAINS.find(d=>d.id===p.id).questions:MODULES[p.id].questions;const missing=qs.filter(q=>answers[q.id]===undefined);if(missing.length){missing.forEach(q=>{const card=document.querySelector(`[data-question="${q.id}"]`);card?.classList.add('has-error');if(card)card.querySelector('.field-error').hidden=false});document.querySelector('.has-error')?.scrollIntoView({behavior:'smooth',block:'center'});return false}}return true}
function applicableQuestions(){const qs=DOMAINS.flatMap(d=>d.questions);const m=activeModules();if(m.PP)qs.push(...MODULES.PP.questions);if(m.CS)qs.push(...MODULES.CS.questions);return qs}
function domainScore(d){const vals=d.questions.map(q=>answers[q.id]).filter(v=>typeof v==='number');return vals.length?Math.round(vals.reduce((a,b)=>a+b,0)/(vals.length*4)*100):0}
function moduleScore(m){const vals=m.questions.map(q=>answers[q.id]).filter(v=>typeof v==='number');return vals.length?Math.round(vals.reduce((a,b)=>a+b,0)/(vals.length*4)*100):0}
function overallScore(){let total=0,w=0;DOMAINS.forEach(d=>{const vals=d.questions.map(q=>answers[q.id]).filter(v=>typeof v==='number');if(vals.length){total+=domainScore(d)*d.weight;w+=d.weight}});return w?Math.round(total/w):0}
function levelKey(s){return s<40?'initial':s<60?'emerging':s<75?'defined':s<90?'managed':'optimized'}
function riskStatus(){const critical=applicableQuestions().filter(q=>q.critical).map(q=>({q,v:answers[q.id]})).filter(x=>typeof x.v==='number');const zeros=critical.filter(x=>x.v===0),ones=critical.filter(x=>x.v===1),twos=critical.filter(x=>x.v===2);if(zeros.length||ones.length>=2)return{key:'red',items:[...zeros,...ones].slice(0,6)};if(ones.length===1||twos.length>=2)return{key:'amber',items:[...ones,...twos].slice(0,6)};return{key:'green',items:[]}}
function completeness(){const qs=applicableQuestions();return qs.length?Math.round(qs.filter(q=>answers[q.id]!==undefined).length/qs.length*100):0}
function coverageClass(v){return v==='na'?'na':String(v??0)}

function priorityActions(){const scores=DOMAINS.map(d=>({id:d.id,name:d.name[lang],score:domainScore(d)})).sort((a,b)=>a.score-b.score);const out=[];scores.slice(0,3).forEach((x,i)=>RECOMMENDATIONS[x.id][lang].forEach((t,j)=>{if(out.length<5)out.push({id:x.id,domain:x.name,text:t,horizon:c().horizons[Math.min(i+j,2)]})}));const m=activeModules();if(m.PP&&moduleScore(MODULES.PP)<60&&out.length<5)out.push({id:'PP',domain:MODULES.PP.name[lang],text:RECOMMENDATIONS.PP[lang][0],horizon:c().horizons[2]});if(m.CS&&moduleScore(MODULES.CS)<60&&out.length<5)out.push({id:'CS',domain:MODULES.CS.name[lang],text:RECOMMENDATIONS.CS[lang][0],horizon:c().horizons[2]});return out.slice(0,5)}

function initToolsCarousel(){const section=document.querySelector('.tools-section'),track=document.getElementById('tools-track'),prev=document.getElementById('tools-prev'),next=document.getElementById('tools-next'),current=document.getElementById('tools-current-page'),totalLabel=document.getElementById('tools-total-pages'),dotsWrap=document.getElementById('tools-dots'),dots=[...document.querySelectorAll('#tools-dots .carousel-dot')];if(!section||!track||!prev||!next||!current||!dots.length)return;let page=0,startX=null;const total=dots.length;totalLabel.textContent=String(total);const update=()=>{track.style.transform=`translateX(-${page*100}%)`;current.textContent=String(page+1);prev.disabled=page===0;next.disabled=page===total-1;dots.forEach((d,i)=>{d.classList.toggle('active',i===page);d.setAttribute('aria-selected',i===page?'true':'false')})};const go=p=>{page=Math.max(0,Math.min(total-1,p));update()};if(total<=1){prev.hidden=true;next.hidden=true;dotsWrap.hidden=true;document.querySelector('.carousel-status').hidden=true}prev.addEventListener('click',()=>go(page-1));next.addEventListener('click',()=>go(page+1));dots.forEach(d=>d.addEventListener('click',()=>go(Number(d.dataset.page))));track.addEventListener('touchstart',e=>{startX=e.touches[0]?.clientX??null},{passive:true});track.addEventListener('touchend',e=>{if(startX===null)return;const dx=(e.changedTouches[0]?.clientX??startX)-startX;if(Math.abs(dx)>50)go(page+(dx<0?1:-1));startX=null},{passive:true});section.addEventListener('keydown',e=>{if(e.key==='ArrowLeft'){e.preventDefault();go(page-1)}if(e.key==='ArrowRight'){e.preventDefault();go(page+1)}});update()}

function renderResults(){const score=overallScore(),level=c().levels[levelKey(score)],risk=riskStatus(),comp=completeness(),actions=priorityActions(),strong=strongest(),m=activeModules();const coverage=`<div class="coverage-grid">${applicableQuestions().map(q=>{const v=answers[q.id],k=coverageClass(v);return`<div class="coverage-item"><div class="coverage-top"><div><div class="coverage-id">${q.id}</div><div class="coverage-title">${q.title[lang]}</div></div><span class="coverage-badge cov-${k}">${c().coverageLabels[k]}</span></div></div>`}).join('')}</div>`;const profileHtml=`<div class="coverage-grid">${PROFILE.map(f=>`<div class="coverage-item"><div class="coverage-id">${c().profileLabels[f.key]}</div><div class="coverage-title">${escapeHtml(profileValue(f.key))}</div></div>`).join('')}</div>`;const openHtml=`<div>${OPEN.map(o=>`<div class="item-card"><span class="item-id">${o.id}</span><div class="item-text"><strong>${o.q[lang]}</strong><br/><span style="color:var(--muted)">${escapeHtml(openAnswers[o.id]||c().unknown)}</span></div></div>`).join('')}</div>`;document.getElementById('screen-container').innerHTML=`${sampleModeActive?`<div class="sample-banner">${c().sampleBanner}</div>`:''}<div class="section-intro"><h1 class="section-title" tabindex="-1">${c().resultsTitle}</h1></div><div class="results-header"><div class="score-big">${score}</div><div class="rating-label">${level[0]}</div><div style="color:var(--muted);font-size:.8rem">${c().overall}: ${score}/100</div></div><div class="indicator-grid"><div class="indicator-card"><div class="indicator-label">${c().risk}</div><span class="status-pill ${statusClass(risk.key)}">${c().riskLabels[risk.key]}</span></div><div class="indicator-card"><div class="indicator-label">${c().completeness}</div><span class="status-pill ${comp===100?'status-green':'status-amber'}">${comp}%</span></div><div class="indicator-card"><div class="indicator-label">${c().overall}</div><span class="status-pill status-blue">${level[0]}</span> async function downloadPdfReport(){const btn=document.getElementById('pdf-btn'),btnLabel=btn?.querySelector('span');if(!window.jspdf?.jsPDF){showToast(c().pdfError);return}if(btn)btn.disabled=true;if(btnLabel)btnLabel.textContent=c().generatingPdf;try{const{jsPDF}=window.jspdf,doc=new jsPDF({unit:'mm',format:'a4',compress:true}),W=210,H=297,M=16;const col={indigo:hexRgb('#5552B4'),blue:hexRgb('#3895FF'),teal:hexRgb('#27B8C6'),gold:hexRgb('#FFC000'),magenta:hexRgb('#BD47BD'),red:hexRgb('#EE0055'),ink:hexRgb('#0B0B0F'),surface:hexRgb('#16161D'),muted:hexRgb('#666978'),line:hexRgb('#D9DAE1'),white:[255,255,255]};const score=overallScore(),level=c().levels[levelKey(score)],risk=riskStatus(),comp=completeness(),actions=priorityActions(),m=activeModules(),covers=await Promise.all(BOOKS[lang].map(b=>loadImage(b.cover).catch(()=>null))),toolImages=await Promise.all(TOOLS.map(t=>loadImage(t.image).catch(()=>null))),logo=await logoData().catch(()=>null);let page=1,y=20;const txt=x=>doc.setTextColor(...x),fill=x=>doc.setFillColor(...x),draw=x=>doc.setDrawColor(...x),wrap=(t,w)=>doc.splitTextToSize(pdfSafe(t),w);function footer(dark=false){draw(dark?[55,55,65]:col.line);doc.line(M,H-14,W-M,H-14);doc.setFont('helvetica','normal');doc.setFontSize(7);txt(dark?[185,188,198]:col.muted);doc.text(pdfSafe(c().reportFooter),M,H-8);doc.textWithLink('LinkedIn: linkedin.com/in/nfernandezba',W-M-46,H-8,{url:LINKEDIN_URL});doc.text(String(page),W-M,H-8,{align:'right'})}function addPage(){footer();doc.addPage();page++;y=20}function ensure(h){if(y+h>H-20)addPage()}function section(title,accent=col.indigo){ensure(14);fill(accent);doc.roundedRect(M,y-4,3,6,1,1,'F');doc.setFont('helvetica','bold');doc.setFontSize(12);txt(col.ink);doc.text(pdfSafe(title),M+6,y);y+=9}function para(text,size=8.7,color=col.muted,width=W-2*M){doc.setFont('helvetica','normal');doc.setFontSize(size);txt(color);const lines=wrap(text,width);doc.text(lines,M,y);y+=lines.length*4.2+3}
